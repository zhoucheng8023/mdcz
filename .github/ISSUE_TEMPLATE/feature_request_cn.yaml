name: 功能请求
description: 使用中文请求新功能或改进
labels: ["enhancement / 功能增强"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: 在提交功能请求之前...
      options:
        - label: 我已经搜索了现有的 issues 确认此功能尚未被提出
          required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 您遇到了什么问题或不便？希望解决什么？
      placeholder: 例如：我在使用 MDCz 时总是需要手动...，这很麻烦
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 简要描述您希望看到的功能或改进
      placeholder: 例如：我希望能有一个功能可以自动...
    validations:
      required: true
