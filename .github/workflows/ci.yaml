name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/**"
      - "resources/**"
      - "build/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "mise.toml"
      - "electron-builder.yml"
      - "electron.vite.config.ts"
      - "biome.json"
      - "vitest.config.ts"
      - "tsconfig*.json"
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck Test Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: jdx/mise-action@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm format

      - run: pnpm build
