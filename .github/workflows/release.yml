name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/**"
      - "resources/**"
      - "build/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "mise.toml"
      - "electron-builder.yml"
      - "electron.vite.config.ts"
      - "tsconfig.json"
      - "tsconfig.node.json"
      - "tsconfig.web.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.check.outputs.skipped }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if version bump needed
        id: check
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == chore\(release\):* ]]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump type from commits
        if: steps.check.outputs.skipped == 'false'
        id: bump-type
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          SUBJECTS=$(git log $RANGE --pretty="%s")
          BODIES=$(git log $RANGE --pretty="%b")

          if echo "$SUBJECTS" | grep -qE "^[a-z]+(\(.+\))?!:"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$BODIES" | grep -qE "^BREAKING CHANGE:"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$SUBJECTS" | grep -qE "^feat(\(.+\))?:"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.check.outputs.skipped == 'false'
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ steps.bump-type.outputs.type }} --no-git-tag-version)
          echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        if: steps.check.outputs.skipped == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin main --tags

  build:
    needs: version
    if: needs.version.outputs.skipped == 'false'

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: build:linux
            glob: "release/*/*.AppImage"
          - os: windows-latest
            script: build:win
            glob: "release/*/*.exe"
          - os: macos-latest
            script: build:mac
            glob: "release/*/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: jdx/mise-action@v4

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.os }}
          path: ${{ matrix.glob }}
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [version, build]
    if: needs.version.outputs.skipped == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: MDCz ${{ needs.version.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: dist/**/*
