appId: com.shotheadman.mdcz
productName: MDCz

asar: true
asarUnpack:
  - resources/**

directories:
  buildResources: build
  output: release/${version}

files:
  - out/**
  - resources/**
  - package.json
  - "!**/*.map"
  - "!node_modules/mediainfo.js/dist/MediaInfoModule.wasm"

extraResources:
  - from: node_modules/mediainfo.js/dist/MediaInfoModule.wasm
    to: MediaInfoModule.wasm

win:
  target:
    - target: portable
      arch:
        - x64

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64

linux:
  category: Utility
  maintainer: ShotHeadman <123543875+ShotHeadman@users.noreply.github.com>
  target:
    - AppImage
